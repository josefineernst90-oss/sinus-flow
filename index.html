<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Limbic Controller Pro</title>
    <style>
        :root {
            --bg: #1e2235;
            --card: #282c44;
            --accent: #22d3ee;
            --text: #f8fafc;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container { width: 100%; max-width: 380px; }

        .card {
            background: var(--card);
            padding: 25px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        .status-bar {
            background: rgba(255,255,255,0.05);
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        h3 { 
            margin: 0 0 15px 0; 
            font-size: 0.8rem; 
            color: var(--accent); 
            letter-spacing: 2px; 
            text-transform: uppercase;
        }

        .sync-grid { text-align: left; margin-bottom: 20px; }

        .switch-label {
            display: flex;
            align-items: center;
            padding: 10px 0;
            cursor: pointer;
            font-size: 1rem;
        }

        .switch-label input { margin-right: 15px; transform: scale(1.4); }

        button {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .btn-primary { background: var(--accent); color: #1e2235; }
        .btn-secondary { background: #3d4466; color: white; }
        .btn-danger { background: #ff5f57; color: white; }
        .btn-success { background: #00d26a; color: white; }
        .btn-neutral { background: #5c668b; color: white; }

        button:disabled { opacity: 0.15; cursor: not-allowed; filter: grayscale(1); }

        #touchpad {
            width: 260px; height: 260px;
            background: #171a2b;
            border: 2px solid #3d4466;
            border-radius: 50%;
            margin: 20px auto;
            position: relative;
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #dot {
            width: 44px; height: 44px;
            background: var(--accent);
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 0 20px var(--accent);
        }

        .looper-controls { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div id="status" class="status-bar">Bereit zum Verbinden</div>
        <button id="connectBtn" class="btn-primary" onclick="connectBLE()">VERBINDEN</button>
    </div>

    <div class="card">
        <h3>MODI AKTIVIEREN</h3>
        <div class="sync-grid">
            <label class="switch-label"><input type="checkbox" id="m0" checked> Ocean (Blau)</label>
            <label class="switch-label"><input type="checkbox" id="m1" checked> Heart (Rot)</label>
            <label class="switch-label"><input type="checkbox" id="m2" checked> Purr (Grün)</label>
            <label class="switch-label" style="opacity:0.5;"><input type="checkbox" id="m3" checked disabled> App (Gelb)</label>
        </div>
        <button id="syncBtn" class="btn-secondary" onclick="syncSettings()" disabled>SYNC ZUM CHIP</button>
    </div>

    <div class="card">
        <h3>HAPTIC LOOPER</h3>
        <div id="touchpad">
            <div id="dot"></div>
        </div>
        <div class="looper-controls">
            <button id="recBtn" class="btn-danger" onclick="startRecording()" disabled>REC</button>
            <button id="stopBtn" class="btn-neutral" onclick="stopRecording()" disabled>STOP</button>
            <button id="playBtn" class="btn-success" onclick="startPlayback()" disabled>PLAY LOOP</button>
        </div>
    </div>
</div>

<script>
    let intensityChar, controlChar, configChar;
    let isDragging = false;
    let isRecording = false;

    const SERVICE_UUID = '00001214-0000-1000-8000-00805f9b34fb';
    const INTENSITY_UUID = '00001215-0000-1000-8000-00805f9b34fb';
    const CONTROL_UUID = '00001216-0000-1000-8000-00805f9b34fb';
    const CONFIG_UUID  = '00001217-0000-1000-8000-00805f9b34fb';

    const dot = document.getElementById('dot');
    const pad = document.getElementById('touchpad');

    async function connectBLE() {
        try {
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [SERVICE_UUID]
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);

            intensityChar = await service.getCharacteristic(INTENSITY_UUID);
            controlChar = await service.getCharacteristic(CONTROL_UUID);
            configChar = await service.getCharacteristic(CONFIG_UUID);

            document.getElementById('status').innerText = "Connected: Limbic ✓";
            document.getElementById('connectBtn').style.display = 'none';
            
            // HIER werden die Buttons aktiviert
            document.getElementById('syncBtn').disabled = false;
            document.getElementById('recBtn').disabled = false;
            
        } catch (e) {
            document.getElementById('status').innerText = "Fehler: " + e.message;
        }
    }

    async function syncSettings() {
        if (!configChar) return;
        let mask = 0;
        if (document.getElementById('m0').checked) mask |= (1 << 0);
        if (document.getElementById('m1').checked) mask |= (1 << 1);
        if (document.getElementById('m2').checked) mask |= (1 << 2);
        mask |= (1 << 3); // Gelb bleibt immer an

        await configChar.writeValue(new Uint8Array([mask]));
        document.getElementById('status').innerText = "Modi synchronisiert! ✓";
    }

    // --- TOUCHPAD LOGIK ---
    pad.addEventListener('pointerdown', (e) => {
        if (!intensityChar) return;
        isDragging = true;
        pad.setPointerCapture(e.pointerId);
        updatePosition(e);
    });

    window.addEventListener('pointermove', (e) => {
        if (isDragging) updatePosition(e);
    });

    window.addEventListener('pointerup', () => {
        isDragging = false;
        if (intensityChar) intensityChar.writeValueWithoutResponse(new Uint8Array([0]));
        dot.style.left = '108px'; dot.style.top = '108px'; // Zurück zur Mitte
    });

    let lastSent = 0;
    function updatePosition(e) {
        const now = Date.now();
        if (now - lastSent < 40) return; // 25Hz Limit
        lastSent = now;

        const rect = pad.getBoundingClientRect();
        let x = e.clientX - rect.left - 130;
        let y = e.clientY - rect.top - 130;

        const maxR = 100;
        const dist = Math.sqrt(x*x + y*y);
        if (dist > maxR) { x *= maxR/dist; y *= maxR/dist; }

        dot.style.left = (x + 108) + 'px';
        dot.style.top = (y + 108) + 'px';

        const val = Math.min(127, Math.floor((dist/maxR) * 127));
        intensityChar.writeValueWithoutResponse(new Uint8Array([val]));
    }

    // --- LOOPER BEFEHLE ---
    async function startRecording() {
        await controlChar.writeValue(new Uint8Array([1]));
        document.getElementById('status').innerText = "🔴 Aufnahme läuft...";
        document.getElementById('stopBtn').disabled = false;
    }

    async function stopRecording() {
        await controlChar.writeValue(new Uint8Array([2]));
        document.getElementById('status').innerText = "Loop gespeichert & aktiv";
        document.getElementById('playBtn').disabled = false;
    }

    async function startPlayback() {
        await controlChar.writeValue(new Uint8Array([2]));
        document.getElementById('status').innerText = "▶️ Loop aktiv";
    }
</script>
</body>
</html>
