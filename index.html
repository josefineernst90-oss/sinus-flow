<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Airmanagement Simulation</title>
    <style>
        * { user-select: none; box-sizing: border-box; }
        html, body { overflow: hidden; background-color: #000; margin: 0; width: 100%; height: 100%; position: fixed; }
        canvas { width: 100%; height: 100%; display: block; }

        /* Status-Anzeige oben links */
        #stats-display { position: fixed; top: 20px; left: 20px; color: rgba(255,255,255,0.3); font-family: monospace; font-size: 11px; z-index: 100; pointer-events: none; }
        
        /* Button-Container oben rechts */
       /* Der Container selbst lässt Klicks durch zum Honig... */
#controls-right { 
    position: fixed; 
    top: 20px; 
    right: 20px; 
    z-index: 10000; /* Höher als alles andere */
    display: flex; 
    flex-direction: column; 
    gap: 10px; 
    pointer-events: none; 
}

/* ...aber die Buttons fangen den Klick aktiv ab! */
button { 
    background: rgba(40, 40, 40, 0.9) !important; 
    border: 1px solid rgba(255, 255, 255, 0.3); 
    color: #fff; 
    font-family: monospace; 
    font-size: 11px; 
    padding: 12px 18px; 
    cursor: pointer; 
    border-radius: 4px; 
    pointer-events: auto !important; /* KRITISCH: Button wird klickbar */
    touch-action: manipulation;
}
        
        button.active { color: #00ff7f; border-color: #00ff7f; background: rgba(0, 255, 127, 0.2); }

        /* UI-Balken unten links */
        #ui-container { position: fixed; bottom: 80px; left: 20px; width: 250px; z-index: 101; font-family: monospace; pointer-events: none; }
        #progress-bar { width: 0%; height: 100%; transition: background 0.3s; }
        #phase-label { font-size: 16px; margin-bottom: 5px; font-weight: bold; }

        /* Puls-Welle ganz unten */
        #pulse-canvas { position: fixed; bottom: 0; left: 0; width: 100%; height: 60px; pointer-events: none; z-index: 99; opacity: 0.5; }
    </style>
    <script>window.ga = window.ga || function() { (ga.q = ga.q || []).push(arguments) };</script>
</head>
<body>
    <canvas></canvas>

    <div id="stats-display">KALIBRIERUNG...</div>
    
    <div id="controls-right">
        <button id="connect-serial">XIAO CONNECT</button>
        <button id="autopilot-btn">GYRO SYNC: AUS</button>
        <button id="clean-session">SESSION CLEAN</button>
        
    </div>

    <div id="ui-container">
        <div id="phase-label">BEREIT</div>
        <div style="width: 100%; height: 10px; background: rgba(255,255,255,0.1); border-radius: 5px; overflow: hidden;">
            <div id="progress-bar"></div>
        </div>
        <div id="timer-display" style="color: rgba(255,255,255,0.6); font-size: 12px; margin-top: 5px;">0.00s / Ø 0.00s</div>
    </div>

    <canvas id="pulse-canvas"></canvas>

    <script src="./script.js"></script>
</body>
</html>
