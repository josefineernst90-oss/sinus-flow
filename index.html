<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Limbic Looper - Biofeedback</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        #status {
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        #touchpad {
            width: 280px;
            height: 280px;
            border: 2px solid #1e293b;
            border-radius: 50%;
            position: relative;
            background: radial-gradient(circle, #1e293b 0%, #0f172a 70%);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #dot {
            width: 44px;
            height: 44px;
            background: #22d3ee;
            border-radius: 50%;
            position: absolute;
            left: 118px; /* Zentriert: (280/2) - (44/2) */
            top: 118px;
            box-shadow: 0 0 20px #22d3ee, 0 0 40px rgba(34, 211, 238, 0.4);
            cursor: grab;
            transition: transform 0.1s ease-out;
        }

        #dot:active {
            cursor: grabbing;
            transform: scale(0.9);
        }

        .controls {
            margin-top: 40px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 280px;
        }

        button {
            padding: 12px 20px;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        #connectBtn {
            grid-column: span 2;
            background-color: #334155;
            color: white;
        }

        #recBtn { background-color: #ef4444; color: white; }
        #stopBtn { background-color: #64748b; color: white; }
        #playBtn { background-color: #22c55e; color: white; }

        button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .recording-pulse {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>
<body>

    <div id="status">Bereit zum Verbinden</div>

    <div id="touchpad">
        <div id="dot"></div>
    </div>

    <div class="controls">
        <button id="connectBtn" onclick="connectBLE()">VERBINDEN</button>
        <button id="recBtn" onclick="startRecording()" disabled>REC</button>
        <button id="stopBtn" onclick="stopRecording()" disabled>STOP</button>
        <button id="playBtn" onclick="startPlayback()" disabled>PLAY LOOP</button>
    </div>

    <script>
        let char;
        let isDragging = false;
        let recording = [];
        let isRecording = false;
        let isPlaying = false;
        let playbackTimer;

        const SERVICE_UUID = '00001214-0000-1000-8000-00805f9b34fb';
        const CHAR_UUID    = '00001215-0000-1000-8000-00805f9b34fb';
        const CTRL_UUID = '00001216-0000-1000-8000-00805f9b34fb';

        const dot = document.getElementById('dot');
        const pad = document.getElementById('touchpad');
        const status = document.getElementById('status');

        // Befehle senden
        async function sendCommand(cmd) {
            if (ctrlChar) {
                await ctrlChar.writeValue(new Uint8Array([cmd]));
            }
        }

        // In startRecording()
        sendCommand(1); 

        // In startPlayback()
        sendCommand(2);

        // In stopRecording()
        sendCommand(0);
        async function connectBLE() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: [SERVICE_UUID]
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                char = await service.getCharacteristic(CHAR_UUID);
                
                status.innerText = "Verbunden ✓";
                document.getElementById('connectBtn').style.display = 'none';
                document.getElementById('recBtn').disabled = false;
            } catch (e) {
                status.innerText = "Fehler: " + e.message;
            }
        }

        // --- STEUERUNGS LOGIK ---
        pad.addEventListener('pointerdown', (e) => {
            if (!char) return;
            isDragging = true;
            pad.setPointerCapture(e.pointerId);
            updatePosition(e);
        });

        window.addEventListener('pointermove', (e) => {
            if (isDragging) updatePosition(e);
        });

        window.addEventListener('pointerup', () => {
            isDragging = false;
            if (!isPlaying && char) sendIntensity(0);
            dot.style.transition = "all 0.3s ease-out";
            dot.style.left = '118px';
            dot.style.top = '118px';
        });
let lastSentTime = 0;
        function updatePosition(e) {
            const now = Date.now();
            // Nur alle 30ms ein Paket schicken (ca. 33 Hz)
            if (now - lastSentTime < 30) return; 
            lastSentTime = now;
            const rect = pad.getBoundingClientRect();
            let x = e.clientX - rect.left - 140;
            let y = e.clientY - rect.top - 140;

            const maxRadius = 110;
            const distance = Math.sqrt(x * x + y * y);

            if (distance > maxRadius) {
                x *= maxRadius / distance;
                y *= maxRadius / distance;
            }

            dot.style.transition = "none";
            dot.style.left = (x + 118) + 'px';
            dot.style.top = (y + 118) + 'px';

          const intensity = Math.min(127, Math.floor((distance / maxRadius) * 127));
    
    if (isRecording) {
        recording.push(intensity);
    }

    if (!isPlaying) sendIntensity(intensity);
        }

        async function sendIntensity(val) {
            if (char) {
                await char.writeValueWithoutResponse(new Uint8Array([val]));
            }
        }

        // --- REC / PLAYBACK LOGIK ---
        function startRecording() {
            recording = [];
            isRecording = true;
            isPlaying = false;
            status.innerText = "🔴 Aufnahme...";
            document.getElementById('recBtn').classList.add('recording-pulse');
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('playBtn').disabled = true;
        }

        function stopRecording() {
            isRecording = false;
            isPlaying = false;
            clearTimeout(playbackTimer);
            document.getElementById('recBtn').classList.remove('recording-pulse');
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('playBtn').disabled = recording.length === 0;
            status.innerText = "Loop bereit (" + recording.length + " pts)";
            sendIntensity(0);
        }

        function startPlayback() {
            if (recording.length === 0) return;
            isPlaying = true;
            status.innerText = "▶️ Loop aktiv";
            document.getElementById('stopBtn').disabled = false;
            playStep(0);
        }

        function playStep(index) {
            if (!isPlaying) return;
            
            sendIntensity(recording[index]);

            let nextIndex = (index + 1) % recording.length;
            // Wir streamen mit ca. 20 Hz (50ms) für flüssiges Gefühl
            playbackTimer = setTimeout(() => playStep(nextIndex), 50);
        }
    </script>
</body>
</html>
